# Butterfly 主题配置
# Docs: https://butterfly.js.org/posts/21cfbf15/

# 导航栏
nav:
  logo:
  display_title: true
  fixed: false

# 菜单
menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open
  友链: /link/ || fas fa-link
  相册: /gallery/ || fas fa-images
  关于: /about/ || fas fa-heart

# Pjax 无刷新加载
pjax:
  enable: true
  exclusion:

# 搜索
local_search:
  enable: true
  preload: false

# 代码块
code_block:
  theme: mac
  macStyle: true
  height_limit: false

# KaTeX 数学公式
katex:
  enable: true
  per_page: false
  hide_scrollbar: true

# Mermaid 图表
mermaid:
  enable: true
  theme:
    light: default
    dark: dark

# Aplayer 音乐播放器
aplayerInject:
  enable: true
  per_page: false

# 社交图标
social:
  fab fa-github: https://github.com/kzxx002 || Github
  fas fa-rss: /atom.xml || RSS

# 头像
avatar:
  img: https://cdn.luogu.com.cn/upload/usericon/920886.png
  effect: true

# 页脚
footer:
  owner:
    enable: true
    since: 2025
  copyright: true
  custom_text:

# 顶部图片
index_img: /img/home_bg.jpg
default_top_img: /img/default_bg.jpg
archive_img: /img/archive_bg.jpg
tag_img: /img/tag_bg.jpg
category_img: /img/category_bg.jpg

# 文章元信息
post_meta:
  date_type: both
  date_format: relative
  categories: true
  tags: true

# 阅读时长（基于 wordcount）
# wordcount 插件自动计算，Butterfly 会自动显示

# TOC 目录
toc:
  post: true
  page: false
  number: true
  expand: false
  style_simple: false

# 版权信息
post_copyright:
  enable: true
  decode: false
  author_href:
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# 回到顶部
back_to_top:
  enable: true
  percentage: true
  scroll_percent: true

# 文章分享
share:
  enable: true
  sites: twitter, facebook, weibo, qq, wechat, linkedin

# 文章分页
post_pagination:
  enable: true
  style: fixed
  order_type: by_tags

# 阅读进度条
progressBar:
  enable: true
  position: top
  color: '#37c6c0'
  height: 3px

# 复制提示
copy:
  enable: true
  copyright:
    enable: true
    limit_count: 50

# 折叠面板 (fold tag)
# 在文章中使用 {% fold 标题 %} 内容 {% endfold %}

# 评论系统 - Giscus
comments:
  use: Giscus
  text: true
  lazyload: true
  count: true
  card_post_count: true

giscus:
  enable: true
  repo: kzxx002/kzxx002.github.io
  repo_id: R_kgDOSZJBUQ
  category_id: DIC_kwDOSZJBUc4C8ydH
  mapping: pathname
  strict: 0
  reactions_enabled: 1
  emit_metadata: 0
  input_position: bottom
  comment_count: 1
  lang: zh-CN
  lazyload: true

# 相关文章
related_post:
  enable: true
  limit: 6
  date_type: created

# 暗黑模式
darkmode:
  enable: true
  button: true
  autoChangeMode: true
  theme:
    light: '#f7f9fc'
    dark: '#1a1a2e'

# 页面粒子动画
canvas_nest:
  enable: true
  color: '0,0,0'
  opacity: 0.5
  zIndex: -1
  count: 99

# 打字机效果
subtitle:
  enable: true
  source: false
  sub:
    - ""

# 字数统计
wordcount:
  enable: true
  count: true
  min_length: 1

# 图片懒加载
lazyload:
  enable: true

# 页面加载动画
loading:
  full_page: false
  pace:
    enable: true

# CDN
CDN:
  option:

# 页脚背景
footer_bg: true

# 自定义 CSS/JS
inject:
  head:
    - |
      <style>
        /* ===== 暗黑模式优化 ===== */
        [data-theme="dark"] {
          --global-bg: #1a1a2e;
          --card-bg: #222244;
          --sidebar-bg: #222244;
          --font-color: #e0e0f0;
          --hr-border: #333366;
          --search-bg: #2a2a4a;
          --search-input-color: #e0e0f0;
          --search-result-title: #c0c0e8;
          --preloader-bg: #1a1a2e;
          --preloader-color: #49b1f5;
          --border-color: #333366;
          --pseudo-hover: rgba(73,177,245,0.15);
          --shadow-color: rgba(0,0,0,0.4);
          --text-bg-hover: rgba(73,177,245,0.12);
          --badge-bg: rgba(73,177,245,0.15);
          --badge-color: #7ec8f5;
          --btn-bg: rgba(73,177,245,0.15);
          --btn-color: #49b1f5;
          --btn-hover-color: #fff;
          --toc-bg: #222244;
          --scrollbar-color: #333366;
          --scrollbar-hover-color: #49b1f5;
          --article-bg: #222244;
          --article-p: #c8c8e0;
          --article-h1: #e8e8ff;
          --article-h2: #e0e0f0;
          --article-h3: #d0d0e8;
          --article-h4: #c8c8e0;
          --article-h5: #b8b8d8;
          --article-h6: #a8a8c8;
          --article-blockquote: #c8c8e0;
          --article-code-bg: #2a2a4a;
          --article-code-color: #e8a0ff;
          --article-img-bg: transparent;
          --article-table-border: #333366;
          --article-table-thead-bg: #2a2a4a;
          --article-table-thead-color: #e0e0f0;
          --article-table-tr-hover-bg: rgba(73,177,245,0.08);
          --tag-bg: rgba(73,177,245,0.12);
          --tag-color: #7ec8f5;
          --tag-hover-color: #fff;
          --tag-hover-bg: #49b1f5;
          --pagination-bg: #2a2a4a;
          --pagination-hover-bg: #49b1f5;
          --pagination-hover-color: #fff;
          --web-bg: #1a1a2e;
          --icon-color: #c0c0e8;
          --icon-color-hover: #49b1f5;
          --reward-pop: #222244;
          --toc-h: #e0e0f0;
          --page-bg: #1a1a2e;
          --text-selection-bg: rgba(73,177,245,0.3);
          --btn-pink: #ff7eb3;
          --btn-pink-hover: #ff5a9e;
        }

        /* 导航栏 */
        [data-theme="dark"] #nav {
          background: rgba(26,26,46,0.92);
          backdrop-filter: blur(12px);
        }

        /* 卡片圆角与阴影 */
        [data-theme="dark"] #aside-content .card-widget,
        [data-theme="dark"] #recent-posts > .recent-post-item,
        [data-theme="dark"] .article-sort-item,
        [data-theme="dark"] .tag-cloud-list a,
        [data-theme="dark"] .category-list-item {
          background: var(--card-bg);
          border: 1px solid var(--border-color);
          border-radius: 12px;
          transition: all 0.3s;
        }
        [data-theme="dark"] #aside-content .card-widget:hover,
        [data-theme="dark"] .article-sort-item:hover {
          border-color: var(--btn-color);
          box-shadow: 0 4px 20px rgba(73,177,245,0.1);
        }

        /* 文章内容 */
        [data-theme="dark"] #article-container {
          color: var(--article-p);
        }
        [data-theme="dark"] #article-container h1,
        [data-theme="dark"] #article-container h2,
        [data-theme="dark"] #article-container h3 {
          color: var(--article-h2);
        }
        [data-theme="dark"] #article-container a {
          color: #7ec8f5;
        }
        [data-theme="dark"] #article-container a:hover {
          color: #a8ddff;
          text-decoration: underline;
        }

        /* 代码块 */
        [data-theme="dark"] #article-container pre,
        [data-theme="dark"] #article-container code {
          background: #16162a;
          border: 1px solid var(--border-color);
          border-radius: 8px;
        }

        /* 滚动条 */
        [data-theme="dark"] ::-webkit-scrollbar {
          width: 6px;
          background: var(--global-bg);
        }
        [data-theme="dark"] ::-webkit-scrollbar-thumb {
          background: var(--scrollbar-color);
          border-radius: 3px;
        }
        [data-theme="dark"] ::-webkit-scrollbar-thumb:hover {
          background: var(--scrollbar-hover-color);
        }

        /* 页脚 */
        [data-theme="dark"] #footer {
          background: #16162a;
          color: var(--article-p);
        }

        /* 阅读进度条 */
        [data-theme="dark"] #page-top {
          background: rgba(26,26,46,0.92);
        }

        /* 暗黑模式按钮 */
        [data-theme="dark"] #darkmodetoggle {
          color: #ffcb6b;
        }
      </style>
  bottom:
    # - <script src="/js/daily-news.js"></script>  # 暂时关闭每日新闻
    - <script src="/js/hitokoto.js"></script>
    - <script src="/js/particle-dark.js"></script>
# Hexo 复制 _data 目录中的文件到 public（用于新闻数据等静态 JSON）
# 不需要插件，手动用 hexo generator 或直接把 JSON 放到 source 根目录
