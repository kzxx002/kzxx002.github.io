# Butterfly 主题配置
# Docs: https://butterfly.js.org/posts/21cfbf15/

# 导航栏
nav:
  logo:
  display_title: true
  fixed: false

# 菜单
menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open
  图床: /tools/upload/ || fas fa-cloud-upload-alt
  剪切板: /tools/clipboard/ || fas fa-clipboard
  关于: /about/ || fas fa-heart

# 搜索
local_search:
  enable: true
  preload: false

# 代码块
code_block:
  theme: mac
  macStyle: true
  height_limit: false

# 社交图标
social:
  fab fa-github: https://github.com/kzxx002 || Github

# 头像
avatar:
  img: /img/avatar.png
  effect: true

# 页脚
footer:
  owner:
    enable: true
    since: 2025
  copyright: true
  custom_text:

# 顶部图片
index_img: /img/home_bg.jpg
default_top_img: /img/default_bg.jpg
archive_img: /img/archive_bg.jpg
tag_img: /img/tag_bg.jpg
category_img: /img/category_bg.jpg

# 文章元信息
post_meta:
  date_type: both
  date_format: relative
  categories: true
  tags: true

# TOC 目录
toc:
  post: true
  page: false
  number: true
  expand: false
  style_simple: false

# 版权信息
post_copyright:
  enable: true
  decode: false
  author_href:
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# 回到顶部
back_to_top:
  enable: true
  percentage: true
  scroll_percent: true

# 文章分享
share:
  enable: true
  sites: twitter, facebook, weibo, qq, wechat, linkedin

# 文章点赞
post_pagination:
  enable: true
  style: fixed
  order_type: by_tags

# 阅读进度条
progressBar:
  enable: true
  position: top
  color: '#37c6c0'
  height: 3px

# 复制提示
copy:
  enable: true
  copyright:
    enable: true
    limit_count: 50

# 评论系统 - Giscus
comments:
  use: Giscus
  text: true
  lazyload: true
  count: true
  card_post_count: true

giscus:
  enable: true
  repo: kzxx002/kzxx002.github.io
  repo_id: # 需要去 https://giscus.app 生成
  category_id: # 需要去 https://giscus.app 生成
  mapping: pathname
  strict: 0
  reactions_enabled: 1
  emit_metadata: 0
  input_position: bottom
  comment_count: 1
  lang: zh-CN
  lazyload: true

# 相关文章
related_post:
  enable: true
  limit: 6
  date_type: created

# 暗黑模式
darkmode:
  enable: true
  button: true
  autoChangeMode: true

# 页面过渡动画
canvas_nest:
  enable: true
  color: '0,0,0'
  opacity: 0.5
  zIndex: -1
  count: 99

# 打字机效果
subtitle:
  enable: true
  source: false
  sub:
    - 记录生活，分享技术
    - 代码改变世界
    - 保持好奇心，持续学习

# 字数统计
wordcount:
  enable: true
  count: true
  min_length: 1

# 图片懒加载
lazyload:
  enable: true

# 页面加载动画
loading:
  full_page: false
  pace:
    enable: true

# CDN
CDN:
  option:

# 页脚背景
footer_bg: true

# 自定义 CSS/JS
inject:
  head:
  bottom:
