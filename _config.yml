# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html

# Site
title: zpy12345的博客
subtitle: '记录生活与技术的个人空间'
description: '个人技术博客，分享编程、技术与生活感悟'
keywords:
  - 博客
  - 技术
  - 编程
  - 生活
author: kzxx002
language: zh-CN
timezone: Asia/Shanghai

# URL
url: https://kzxx002.github.io
root: /
permalink: posts/:year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: false
  trailing_html: false

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude
include:
exclude:
ignore:

# Extensions
theme: butterfly

# Deployment - use GitHub Actions instead
deploy:
  type: ''

# RSS 订阅
feed:
  enable: true
  type: atom
  path: atom.xml
  limit: 20
  hub:
  content:
  content_limit: 150
  content_limit_delim: '...'
  order_by: -date
  icon: icon.png
  autodiscovery: true

# Sitemap
sitemap:
  path: sitemap.xml
  rel: false
  tags: true
  categories: true

# 搜索数据库
search:
  path: search.json
  field: post
  content: true
  format: striptags
